<!DOCTYPE html>
<html>
<head>
    <title>NOVA - Login</title>
    <link rel="stylesheet" href="style_1.css">
</head>
<body>

<header>
    <h2 class="logo">NOVA</h2>
</header>

<div class="container">

    <h2>Member Login</h2>

    <p class="subtitle">
        Access your Nova account
    </p>

    <input
        type="email"
        id="email"
        placeholder="Email Address">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="validateLogin()">
        Login
    </button>

    <p id="message"></p>

</div>

<footer>
    © 2026 NOVA. All Rights Reserved.
</footer>

<script src="script.js"></script>

</body>
</html>
