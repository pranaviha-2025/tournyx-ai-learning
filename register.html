<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
    <style>
        *{ box-sizing: border-box; }
        body{ font-family: Arial, sans-serif; background-color: #0A0F0D; margin: 0; padding: 20px; color: #F8FAFC; }
        .container{ max-width: 500px; margin: auto; background: #121A17; padding: 25px; border-radius: 15px; box-shadow: 0 0 25px rgba(16,185,129,0.15); }
        h1{ text-align: center; color: #34D399; letter-spacing: 1px; }
        label{ font-weight: bold; color: #D1FAE5; }
        input{ width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #1E4D3A; border-radius: 5px; box-sizing: border-box; background: #0F241C; color: white; outline: none; transition: 0.3s; }
        input:focus{ border-color: #34D399; box-shadow: 0 0 10px rgba(52,211,153,0.4); }
        button{ width: 100%; padding: 12px; border: none; background: linear-gradient(135deg, #10B981, #34D399); color: #04130D; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover{ transform: translateY(-2px); box-shadow: 0 0 20px rgba(52,211,153,0.4);}
        .container{ max-width: 900px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registration Page</h1>
        <form id="registerForm">
            <label>Name</label>
            <input type="text" id="name">
            <br><br>
            <label>Email</label>
            <input type="email" id="email">
            <br><br>
            <label>Phone Number</label>
            <input type="tel" id="phone">
            <br><br>
            <label>Password</label>
            <input type="password" id="password">
            <br><br>
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword">
            <br><br>
            <button type="submit">Register</button>
        </form>
    </div>
    <script>
        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault(); 
            
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;

            localStorage.setItem("name", name);
            localStorage.setItem("email", email);
            localStorage.setItem("phone", phone);

            if(
                name === "" ||
                email === "" ||
                phone === "" ||
                password === "" ||
                confirmPassword === ""
            ) {
                alert("All fields are mandatory!");
                return;
            }

            if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert("Please enter a valid email address");
                return;
            }

            if(!/^\d{10}$/.test(phone)) {
                alert("Phone number must contain 10 digits!");
                return;
            }

            if(password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            window.location.href = "dashboard.html"; });
    </script>
</body>
</html>
