<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        *{ box-sizing: border-box; }
        body{ font-family: Arial, sans-serif; padding: 20px; background-color: #0A0F0D; margin: 0; color: #F8FAFC;}
        .card{ border: 1px solid #1E4D3A; border-radius: 10px; padding: 20px; margin-top: 15px; flex: 1; min-width: 200px; box-shadow: 0 6px 18px rgba(0,0,0,0.35); transition: 0.3s; background: #121A17; color: #F8FAFC; }
        h1{ text-align: center; color: #34D399; margin-bottom: 30px; letter-spacing: 2px; }
        .user-details{ background: linear-gradient( 135deg, #0F241C, #163328); color: #F8FAFC; padding: 25px; border-radius: 18px; margin-bottom: 25px; border: 1px solid #1E4D3A; box-shadow: 0 0 25px rgba(16,185,129,0.18); }
        .cards{ display: flex; gap: 20px; flex-wrap: wrap; }
        .card:hover{ transform: translateY(-5px); box-shadow: 0 0 20px rgba(52,211,153,0.25) }
        .card h3{ margin-top: 0; color: #34D399;}
        button{ width: 100%; padding: 12px; border: none; background: linear-gradient( 135deg, #10B981, #34D399); color:  #04130D; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover{ transform: translateY(-2px); box-shadow: 0 0 15px rgba(52,211,153,0.4); }
        .container{ max-width: 900px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DASHBOARD</h1>
        <div class="user-details">
            <h2>User Details:</h2>
            <p>Name: <span id="displayName"></span></p>
            <p>Email: <span id="displayEmail"></span></p>
            <p>Phone: <span id="displayPhone"></span></p>       
        </div>
        <div class="cards">
            <div class="card">
                <h3>👤 Profile</h3>
                <p>View and manage your profile information.</p>
            </div>
            <div class="card">
                <h3>⚙️ Settings</h3>
                <p>Update preferences and account settings.</p>
            </div>
            <div class="card">
                <h3>📈 Activity</h3>
                <p>Track your recent actions and activity.</p>
            </div>
        </div>
    </div>
</body>
<script>
    document.getElementById("displayName").innerText = localStorage.getItem("name");
    document.getElementById("displayEmail").innerText = localStorage.getItem("email");
    document.getElementById("displayPhone").innerText = localStorage.getItem("phone");
</script>
</html>
